services:
  restaurante-app:
    build: .
    container_name: sistema-pedidos-restaurante
    ports:
      - "3021:3021"
    environment:
      - PORT=3021
      - NODE_ENV=production
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - restaurante-network

networks:
  restaurante-network:
    driver: bridge
