<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entre Dichos y Chorizos - Sistema de Pedidos</title>
  <link rel="icon" href="/images/logo-circular.png" type="image/png">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <div class="logo-container">
        <img src="/images/logo-horizontal.png" alt="Entre Dichos y Chorizos" class="login-logo">
      </div>
      
      <form id="loginForm">
        <div class="form-group">
          <label for="usuario">Usuario</label>
          <input type="text" id="usuario" name="usuario" required autofocus>
        </div>
        
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" required>
        </div>
        
        <button type="submit" class="btn btn-primary">Iniciar Sesión</button>
        
        <div id="error-message" class="error-message" style="display: none;"></div>
      </form>
      
      <div class="login-info">
        <p><strong>Usuarios de prueba:</strong></p>
        <ul>
          <li>Mesero: <code>mesero / mesero123</code></li>
          <li>Cocinero: <code>cocinero / cocinero123</code></li>
          <li>Cajero: <code>cajero / cajero123</code></li>
        </ul>
      </div>
    </div>
  </div>
  
  <script src="/js/login.js"></script>
</body>
</html>
